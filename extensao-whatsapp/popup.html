<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; margin: 0; padding: 16px; background: #1a1d2e; color: #e7e9f0;
      font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
    h1 { font-size: 14px; margin: 0 0 2px; }
    .sub { font-size: 11px; color: #8c93a8; margin: 0 0 14px; }
    label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .4px; color: #8c93a8; margin: 12px 0 5px; }
    input, select { width: 100%; box-sizing: border-box; background: #12151f; border: 1px solid #2c3247;
      border-radius: 8px; padding: 9px 10px; font-size: 12.5px; color: #e7e9f0; }
    button { width: 100%; margin-top: 14px; background: #2563eb; color: #fff; border: none;
      border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
    button.sec { background: #2c3247; margin-top: 8px; }
    #status { font-size: 12px; margin-top: 12px; min-height: 16px; }
    .ok { color: #1fd8a4; } .err { color: #f43f5e; } .info { color: #8c93a8; }
    .nota { font-size: 10.5px; color: #6b7185; line-height: 1.5; margin-top: 12px;
      border-top: 1px solid #2c3247; padding-top: 10px; }
  </style>
</head>
<body>
  <h1>JOB Serenus</h1>
  <p class="sub">Análise de conversa do WhatsApp · somente leitura</p>

  <label for="jobUrl">URL do JOB</label>
  <input id="jobUrl" type="text" placeholder="https://job-serenus-production.up.railway.app">

  <label for="extKey">Chave da extensão</label>
  <input id="extKey" type="password" placeholder="cole a chave (env WHATSAPP_EXT_KEY)">

  <label for="usuarioId">Quem está usando (consultor)</label>
  <select id="usuarioId">
    <option value="">Selecione…</option>
  </select>

  <button id="salvar">Salvar</button>
  <button id="testar" class="sec">Testar conexão</button>
  <div id="status" class="info"></div>

  <div class="nota">
    A chave é a mesma configurada no Railway (variável <b>WHATSAPP_EXT_KEY</b>).
    O consultor selecionado vira o responsável dos leads criados automaticamente.
    Esta extensão só lê a conversa aberta e nunca envia mensagens.
  </div>

  <script src="popup.js"></script>
</body>
</html>
